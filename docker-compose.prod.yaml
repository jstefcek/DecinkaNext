services:
  # Backend service (Django)
  backend:
    build:
      context: .
      dockerfile: Docker/backend/DockerFile.dev
    container_name: backend
    env_file:
      - .env.dev
    volumes:
      - ./Backend:/decinkanext 
      - static_volume:/decinkanext/static
      - ./djangocache:/tmp/django_cache
      - ./logs:/decinkanext/logs
    depends_on:
      goldfren_mysql:
        condition: service_healthy
    networks:
      - mynetwork
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

# Networks definition
# This section defines the custom network used by the services
networks:
  mynetwork:
    driver: bridge

# Volumes definition
# This section defines the named volumes used by the services
volumes:
  mysql_data:
  static_volume: